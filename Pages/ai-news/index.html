<style>
/* ===== フィルターバー ===== */
.filter-bar {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  margin-bottom:20px;
}
.filter-btn {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:5px 14px; border-radius:20px; cursor:pointer; border:none;
  background:var(--ai-panel); border:1px solid var(--ai-border2);
  color:var(--text-muted); transition:all 0.2s;
}
.filter-btn:hover, .filter-btn.active {
  background:rgba(255,107,26,0.12); border-color:rgba(255,107,26,0.4);
  color:var(--accent);
}
.filter-count {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  color:var(--text-muted); margin-left:auto;
}

/* ===== ニュースカード ===== */
.news-list { display:flex; flex-direction:column; gap:12px; }
.news-card {
  background:var(--ai-panel); border:1px solid var(--ai-border2);
  border-radius:12px; padding:18px 20px; cursor:pointer;
  text-decoration:none; display:block;
  transition:border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.2s;
  position:relative; overflow:hidden;
}
.news-card:hover {
  border-color:rgba(255,107,26,0.5);
  background:rgba(255,107,26,0.05);
  box-shadow:0 0 16px rgba(255,107,26,0.18);
  transform:translateX(4px);
}
.news-card.high-importance {
  border-left:3px solid var(--neon-orange);
  border-radius:0 12px 12px 0;
}
.news-card-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;
}
.news-date {
  font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted);
}
.news-cat {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:2px 9px; border-radius:3px;
}
.news-cat.claude { background:rgba(255,107,26,0.12); color:var(--accent); border:1px solid rgba(255,107,26,0.25); }
.news-cat.ai-global { background:rgba(74,158,255,0.12); color:#4A9EFF; border:1px solid rgba(74,158,255,0.25); }
.news-cat.law-jp { background:rgba(255,193,51,0.12); color:#ffc933; border:1px solid rgba(255,193,51,0.25); }
.news-cat.cert { background:rgba(52,211,153,0.12); color:var(--accent3); border:1px solid rgba(52,211,153,0.25); }
.news-cat.incident { background:rgba(255,75,110,0.12); color:var(--accent-red); border:1px solid rgba(255,75,110,0.25); }
.news-badge-new {
  font-family:'JetBrains Mono',monospace; font-size:9px;
  background:rgba(255,107,26,0.15); color:var(--accent);
  border:1px solid rgba(255,107,26,0.35); border-radius:3px;
  padding:1px 7px; animation:glowOrange 1.8s ease-in-out infinite;
}
.news-badge-high {
  font-family:'JetBrains Mono',monospace; font-size:9px;
  background:rgba(255,75,110,0.1); color:var(--accent-red);
  border:1px solid rgba(255,75,110,0.25); border-radius:3px;
  padding:1px 7px;
}
.news-title {
  font-size:15px; font-weight:500; color:var(--text-primary);
  line-height:1.5; margin-bottom:8px;
  transition:color 0.2s;
}
.news-card:hover .news-title { color:var(--accent); }
.news-summary { font-size:13px; color:#78909c; line-height:1.75; margin-bottom:10px; }
.news-footer {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.news-tag {
  font-size:11px; color:var(--text-muted);
  background:rgba(255,255,255,0.04); border:1px solid var(--ai-border2);
  border-radius:3px; padding:1px 8px;
  font-family:'JetBrains Mono',monospace;
}
.news-arrow {
  margin-left:auto; font-size:14px; color:var(--text-muted);
  opacity:0; transform:translateX(-6px);
  transition:opacity 0.2s, transform 0.2s;
}
.news-card:hover .news-arrow { opacity:1; transform:translateX(0); }

/* ===== カテゴリラベル ===== */
.cat-labels {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;
}
.cat-label {
  display:flex; align-items:center; gap:6px;
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted);
}
.cat-dot { width:8px; height:8px; border-radius:50%; }

@media (max-width:768px) {
  .news-card-header { gap:6px; }
  .news-title { font-size:14px; }
}

<script>
  renderSiteHeader({ root: '../../' });

  const CAT_LABELS = {
    'claude':    'Claude',
    'ai-global': 'AI全般',
    'law-jp':    '法令・規制',
    'cert':      '資格・認定',
    'incident':  'インシデント',
  };

  let currentFilter = 'all';

  function renderNews(filter) {
    const list = document.getElementById('newsList');
    const filtered = filter === 'all'
      ? NEWS_DATA
      : NEWS_DATA.filter(n => n.category === filter);

    document.getElementById('totalCount').textContent = NEWS_DATA.length + ' 件';
    document.getElementById('filterCount').textContent =
      filter === 'all' ? `全 ${NEWS_DATA.length} 件` : `${filtered.length} 件`;
    document.getElementById('sbNewsCount').textContent = NEWS_DATA.length;

    list.innerHTML = filtered.map(n => `
      <a class="news-card${n.importance === 'high' ? ' high-importance' : ''}"
         href="news-detail.html?id=${n.id}">
        <div class="news-card-header">
          <span class="news-date">${n.date}</span>
          <span class="news-cat ${n.category}">${CAT_LABELS[n.category] || n.category}</span>
          ${n.isNew ? '<span class="news-badge-new">NEW</span>' : ''}
          ${n.importance === 'high' ? '<span class="news-badge-high">重要</span>' : ''}
        </div>
        <div class="news-title">${n.title}</div>
        <div class="news-summary">${n.summary}</div>
        <div class="news-footer">
          ${(n.tags || []).slice(0, 4).map(t => `<span class="news-tag">${t}</span>`).join('')}
          <span class="news-arrow">→</span>
        </div>
      </a>
    `).join('');
  }

  function filterNews(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderNews(cat);
  }

  renderNews('all');
</script>
