<style>
/* ===== フィルターバー ===== */
.filter-bar {
  display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  margin-bottom:24px; padding:14px 18px;
  background:var(--ai-panel); border:1px solid var(--ai-border2); border-radius:10px;
}
.filter-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); letter-spacing:0.1em; margin-right:4px; }
.filter-btn {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  padding:4px 12px; border-radius:20px;
  border:1px solid var(--ai-border2); background:transparent;
  color:var(--text-secondary); cursor:pointer; transition:all 0.2s; letter-spacing:0.06em;
}
.filter-btn:hover { border-color:rgba(255,107,26,0.4); color:var(--neon-orange); background:rgba(255,107,26,0.07); }
.filter-btn.active { border-color:rgba(255,107,26,0.6); color:var(--neon-orange); background:rgba(255,107,26,0.12); }

/* ===== セクション ===== */
.section { margin-bottom:36px; opacity:0; animation:fadeUp 0.5s ease both; }
.section-header { display:flex; align-items:baseline; gap:14px; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--ai-border); }
.section-title { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:0.1em; color:var(--text-primary); }
.section-title span { animation:orangePinkShift 2.4s ease-in-out infinite; }
.section-count { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted); letter-spacing:0.06em; }
.copy-all-btn {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.08em;
  padding:5px 14px; border-radius:4px;
  border:1px solid rgba(255,107,26,0.3); background:rgba(255,107,26,0.07);
  color:var(--neon-orange); cursor:pointer; transition:all 0.2s; margin-left:auto;
}
.copy-all-btn:hover { background:rgba(255,107,26,0.15); border-color:rgba(255,107,26,0.6); }

/* ===== 絵文字グリッド ===== */
.emoji-grid { display:flex; flex-wrap:wrap; gap:10px; }

.emoji-item {
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
  background:var(--ai-panel); border:1px solid var(--ai-border2); border-radius:12px;
  padding:0; width:96px; height:100px;
  cursor:pointer; transition:all 0.18s; position:relative;
  user-select:none; flex-shrink:0;
}
.emoji-item:hover {
  border-color:rgba(255,107,26,0.45);
  background:rgba(12,21,38,0.95);
  transform:translateY(-4px);
  box-shadow:0 6px 20px rgba(255,107,26,0.15);
}
.emoji-item:active { transform:scale(0.93); }
.emoji-char { font-size:36px; line-height:1; transition:transform 0.15s; flex-shrink:0; }
.emoji-item:hover .emoji-char { transform:scale(1.15); }
.emoji-item.copied .emoji-char { animation:popScale 0.3s ease; }
.emoji-name {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-muted);
  letter-spacing:0.02em; text-align:center; line-height:1.3;
  width:88px; height:28px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.emoji-item.copied { border-color:rgba(0,201,167,0.5); background:rgba(0,201,167,0.06); }
.copy-flash {
  position:absolute; top:-7px; right:-7px;
  background:var(--accent-teal); color:#060c18;
  font-family:'JetBrains Mono',monospace; font-size:8px;
  padding:2px 6px; border-radius:10px; font-weight:700;
  pointer-events:none; opacity:0; transition:opacity 0.2s;
}
.emoji-item.copied .copy-flash { opacity:1; }

/* ===== トースト ===== */
#toast {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  background:rgba(0,201,167,0.15); border:1px solid rgba(0,201,167,0.4);
  color:var(--accent-teal); font-family:'JetBrains Mono',monospace; font-size:12px;
  padding:10px 24px; border-radius:24px; backdrop-filter:blur(12px);
  pointer-events:none; z-index:9000; opacity:0; letter-spacing:0.06em;
}
#toast.show { animation:toastIn 0.25s ease forwards; }
#toast.hide { animation:toastOut 0.25s ease forwards; }
@keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@keyframes toastOut { from{opacity:1;transform:translateX(-50%) translateY(0)} to{opacity:0;transform:translateX(-50%) translateY(-10px)} }
@keyframes popScale { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

/* ===== サイドバー after を common.css と完全一致させる（二重線防止） ===== */
.sidebar::after {
  content:''; position:absolute; top:0; right:0; width:1px; height:100%;
  background:linear-gradient(180deg,transparent,#FF6B1A 40%,#FF1493 60%,transparent);

.page-hero {

.page-hero::after {

.hero-body { flex:1; }
.page-eyebrow { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; color:var(--accent); margin-bottom:10px; opacity:0; animation:fadeUp 0.5s ease 0.2s forwards; }
.page-title { font-family:'Rajdhani',sans-serif; font-size:clamp(1.4rem,3vw,2rem); font-weight:700; color:#fff; margin-bottom:10px; line-height:1.1; opacity:0; animation:fadeUp 0.5s ease 0.35s forwards; }
.page-title .accent { color:var(--neon-orange); }
.page-lead { font-size:14px; color:#b0bec5; line-height:1.9; max-width:560px; opacity:0; animation:fadeUp 0.5s ease 0.5s forwards; }
.hero-tip { margin-top:12px; display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--accent-teal); background:rgba(0,201,167,0.08); border:1px solid rgba(0,201,167,0.25); padding:5px 14px; border-radius:20px; }

/* ================================================================
   描画・フィルター
================================================================ */
let currentCat = 'all';

function buildAll() {
  const wrap = document.getElementById('sections-wrap');
  const filterBar = document.getElementById('filter-bar');
  let totalCount = 0;

  EMOJI_DATA.forEach(cat => {
    totalCount += cat.items.length;

    // フィルターボタン追加
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat.icon + ' ' + cat.cat;
    btn.onclick = () => filterCat(btn, cat.cat);
    filterBar.appendChild(btn);

    // セクション生成
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.dataset.cat = cat.cat;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-title"><span>${cat.icon}</span> ${cat.cat}</div>
      <div class="section-count">${cat.items.length} 個</div>
      <button class="copy-all-btn" onclick="copyAll('${cat.cat}')">全コピー</button>`;
    sec.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'emoji-grid';
    cat.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'emoji-item';
      el.dataset.emoji = item.e;
      el.dataset.cat = cat.cat;
      el.innerHTML = `
        <div class="emoji-char">${item.e}</div>
        <div class="emoji-name">${item.n}</div>
        <div class="copy-flash">COPIED</div>`;
      el.onclick = () => copyEmoji(el, item.e);
      grid.appendChild(el);
    });
    sec.appendChild(grid);
    wrap.appendChild(sec);
  });

  document.getElementById('total-count').textContent = totalCount + '個';

  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) { en.target.style.animationPlayState = 'running'; obs.unobserve(en.target); }
    });
  }, { threshold: 0.05 });
  document.querySelectorAll('.section').forEach(s => obs.observe(s));
}

function filterCat(btn, cat) {
  currentCat = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section[data-cat]').forEach(s => {
    s.style.display = (cat === 'all' || s.dataset.cat === cat) ? '' : 'none';
  });
}

/* ================================================================
   コピー
================================================================ */
let toastTimer = null;

function copyEmoji(el, emoji) {
  navigator.clipboard.writeText(emoji).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 1200);
    showToast(`「${emoji}」をコピーしました`);
  });
}

function copyAll(catName) {
  const items = document.querySelectorAll(`.emoji-item[data-cat="${catName}"]`);
  const text = Array.from(items).map(el => el.dataset.emoji).join(' ');
  navigator.clipboard.writeText(text).then(() => {
    showToast(`「${catName}」を全コピーしました（${items.length}個）`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.remove('hide');
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.remove('show');
    t.classList.add('hide');
  }, 2200);
}

buildAll();
